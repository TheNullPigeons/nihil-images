name: Audit Build (soft fail)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      audit: ${{ steps.check.outputs.audit }}
    steps:
      - name: Check commit message for [audit]
        id: check
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -q '\[audit\]'; then
            echo "audit=true" >> $GITHUB_OUTPUT
          else
            echo "audit=false" >> $GITHUB_OUTPUT
          fi

  audit-ad:
    needs: check-trigger
    if: needs.check-trigger.outputs.audit == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (ad) in audit mode
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ad
          push: false
          no-cache: true
          build-args: |
            NIHIL_AUDIT=1

  audit-web:
    needs: check-trigger
    if: needs.check-trigger.outputs.audit == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (web) in audit mode
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.web
          push: false
          no-cache: true
          build-args: |
            NIHIL_AUDIT=1

  audit-blueteam:
    needs: check-trigger
    if: needs.check-trigger.outputs.audit == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (blueteam) in audit mode
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.blueteam
          push: false
          no-cache: true
          build-args: |
            NIHIL_AUDIT=1

  audit-full:
    needs: check-trigger
    if: needs.check-trigger.outputs.audit == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (full) in audit mode
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          no-cache: true
          build-args: |
            NIHIL_AUDIT=1
